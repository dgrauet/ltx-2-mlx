name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: lint (ruff check)
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3.6.1
        with:
          args: check packages/ tests/
      - name: format (ruff format)
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3.6.1
        with:
          args: format --check packages/ tests/

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Validate Python syntax
        run: |
          python -c "
          import ast, sys, glob
          files = glob.glob('packages/**/src/**/*.py', recursive=True) + glob.glob('tests/**/*.py', recursive=True)
          ok = True
          for f in sorted(set(files)):
              try:
                  with open(f) as fh: ast.parse(fh.read())
              except SyntaxError as e:
                  print(f'FAIL: {f}: {e}'); ok = False
          print(f'{len(files)} files checked')
          if not ok: sys.exit(1)
          "

  test:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: uv sync --all-extras
      - name: Type-check with ty
        run: uv run ty check
        continue-on-error: true
      - run: uv run pytest tests/ -v -m "not slow" --tb=short

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
