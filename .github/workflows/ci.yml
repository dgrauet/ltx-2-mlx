name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: lint (ruff check)
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89  # v4.1.0
        with:
          args: check packages/ tests/
      - name: format (ruff format)
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89  # v4.1.0
        with:
          args: format --check packages/ tests/

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Validate Python syntax
        run: |
          python -c "
          import ast, sys, glob
          files = glob.glob('packages/**/src/**/*.py', recursive=True) + glob.glob('tests/**/*.py', recursive=True)
          ok = True
          for f in sorted(set(files)):
              try:
                  with open(f) as fh: ast.parse(fh.read())
              except SyntaxError as e:
                  print(f'FAIL: {f}: {e}'); ok = False
          print(f'{len(files)} files checked')
          if not ok: sys.exit(1)
          "

  test:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg
        run: brew install ffmpeg
      - run: uv sync --all-extras
      - name: Type-check with ty
        run: uv run ty check
        continue-on-error: true
      - run: uv run pytest tests/ -v -m "not slow" --tb=short

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
